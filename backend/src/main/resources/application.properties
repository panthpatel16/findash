# =============================
# FinDash Backend Configuration
# =============================
spring.application.name=findash-backend
server.port=8080

# --- Development: H2 in-memory (default profile) ---
spring.datasource.url=jdbc:h2:mem:findashdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:findash-dev-secret-key-minimum-256-bits-replace-in-prod}
jwt.expiration.ms=86400000

# --- Logging ---
logging.level.com.findash=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================================================================
# Production profile — set SPRING_PROFILES_ACTIVE=prod to activate
# Requires: DATABASE_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET env vars
